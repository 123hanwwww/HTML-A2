<div class="inventory-container">
  <h1>Inventory Management</h1>
  
  <!-- Add Item Form -->
  <div class="form-section">
    <h2>Add New Item</h2>
    <form (ngSubmit)="addItem()" #itemForm="ngForm">
      <div class="form-group">
        <label for="name">Item Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="newItem.name" required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" [(ngModel)]="newItem.description" required></textarea>
      </div>
      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" [(ngModel)]="newItem.quantity" min="1" required>
      </div>
      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" [(ngModel)]="newItem.price" min="0" step="0.01" required>
      </div>
      <button type="submit" [disabled]="!itemForm.valid">Add Item</button>
    </form>
  </div>

  <!-- Edit Item Form -->
  <div class="form-section" *ngIf="editingItem">
    <h2>Edit Item</h2>
    <form (ngSubmit)="updateItem()" #editForm="ngForm">
      <div class="form-group">
        <label for="name">Item Name</label>
        <input type="text" id="name" name="name" [(ngModel)]="editingItem.name" required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" [(ngModel)]="editingItem.description" required></textarea>
      </div>
      <div class="form-group">
        <label for="quantity">Quantity</label>
        <input type="number" id="quantity" name="quantity" [(ngModel)]="editingItem.quantity" min="1" required>
      </div>
      <div class="form-group">
        <label for="price">Price</label>
        <input type="number" id="price" name="price" [(ngModel)]="editingItem.price" min="0" step="0.01" required>
      </div>
      <div class="form-actions">
        <button type="submit" [disabled]="!editForm.valid">Update Item</button>
        <button type="button" (click)="cancelEdit()">Cancel</button>
      </div>
    </form>
  </div>

  <!-- Search and Sort -->
  <div class="inventory-controls">
    <div class="search-box">
      <input type="text" placeholder="Search items..." [(ngModel)]="searchQuery" (input)="onSearchChange()">
    </div>
    <div class="sort-controls">
      <select [(ngModel)]="sortBy" (change)="onSortChange()">
        <option value="id">ID</option>
        <option value="name">Name</option>
        <option value="quantity">Quantity</option>
        <option value="price">Price</option>
      </select>
      <button (click)="toggleSortOrder()" class="sort-order-btn">
        {{ sortOrder === 'asc' ? '↑' : '↓' }}
      </button>
    </div>
  </div>

  <!-- Inventory List -->
  <div class="inventory-list">
    <div class="list-header">
      <h2>All Items</h2>
      <button *ngIf="selectedItems.length > 0" (click)="deleteSelectedItems()" class="delete-selected-btn">
        Delete Selected ({{ selectedItems.length }})
      </button>
    </div>
    <table>
      <thead>
        <tr>
          <th class="checkbox-col">
            <input type="checkbox" [checked]="isAllSelected()" (change)="selectAllItems()">
          </th>
          <th>ID</th>
          <th>Name</th>
          <th>Description</th>
          <th>Quantity</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of filteredInventory">
          <td class="checkbox-col">
            <input type="checkbox" [checked]="isItemSelected(item.name)" (change)="toggleItemSelection(item.name)">
          </td>
          <td>{{ item.id }}</td>
          <td>{{ item.name }}</td>
          <td>{{ item.description }}</td>
          <td>{{ item.quantity }}</td>
          <td>${{ item.price }}</td>
          <td>
            <button (click)="editItem(item)">Edit</button>
            <button (click)="deleteItem(item.name)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div *ngIf="filteredInventory.length === 0" class="no-items">
      <p>No items found.</p>
    </div>
  </div>
</div>
